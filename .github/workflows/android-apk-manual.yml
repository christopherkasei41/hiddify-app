name: Android APK (patched core)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/android-apk-manual.yml'
      - 'patches/core-no-listeners.patch'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Get dependencies
        run: flutter pub get

      - name: Clean
        run: flutter clean

      - name: Build APK (release)
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --split-per-abi \
            --target-platform android-arm64 \
            --suppress-analytics \
            --no-pub

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
