name: Android APK (patched core)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/android-apk-manual.yml'
      - 'patches/core-no-listeners.patch'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r27
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Clone hiddify-core upstream
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git clone --filter=blob:none --depth=1 https://github.com/hiddify/hiddify-core.git hiddify-core || {
            echo "Clone failed, retrying in 10s..."
            sleep 10
            git clone --filter=blob:none --depth=1 https://github.com/hiddify/hiddify-core.git hiddify-core
          }
          cd hiddify-core
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1 || {
            echo "Submodule update failed, retrying in 10s..."
            sleep 10
            git submodule update --init --recursive --depth=1
          }

      - name: Diagnose patch preconditions
        run: |
          cd hiddify-core
          git log --oneline -n 5
          ls -la v2/config/ | head -20

      - name: Apply no-listeners patch (3-way)
        run: |
          cd hiddify-core
          git apply --check --ignore-whitespace ../patches/core-no-listeners.patch
          git apply --3way --ignore-whitespace ../patches/core-no-listeners.patch

      - name: Install gomobile tools
        run: |
          go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.11
          go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.11
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Android core (.aar)
        run: |
          cd hiddify-core
          npm install || true
          make android
          ls -lh bin/hiddify-core.aar

      - name: Copy AAR into app
        run: |
          mkdir -p android/app/libs
          cp hiddify-core/bin/hiddify-core.aar android/app/libs/
          ls -lh android/app/libs/

      - name: Setup Flutter cache dirs
        run: |
          mkdir -p ~/.pub-cache/bin
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install app deps
        run: |
          make android-apk-install-deps

      - name: Prepare
        run: make common-prepare

      - name: Build APK
        env:
          SENTRY_DSN: ""
        run: make android-apk-release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-patched-core
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload diagnostics (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-workflow
          path: |
            hiddify-core/bin/
            build/app/outputs/
          retention-days: 7
