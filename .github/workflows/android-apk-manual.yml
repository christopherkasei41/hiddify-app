name: Android APK (patched core)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/android-apk-manual.yml'
      - 'patches/core-no-listeners.patch'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Clone hiddify-core
        run: |
          git clone --depth=1 https://github.com/hiddify/hiddify-core.git hiddify-core
          cd hiddify-core
          git submodule update --init --recursive --depth=1

      - name: Apply patch
        run: |
          cd hiddify-core
          git apply --check --ignore-whitespace ../patches/core-no-listeners.patch
          git apply --3way --ignore-whitespace ../patches/core-no-listeners.patch

      - name: Build core AAR
        run: |
          cd hiddify-core
          go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.11
          go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.11
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          npm install || true
          make android

      - name: Copy AAR
        run: |
          mkdir -p android/app/libs
          cp hiddify-core/bin/hiddify-core.aar android/app/libs/
          ls -lh android/app/libs/

      - name: Install deps
        run: |
          make android-apk-install-deps
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare
        run: make common-prepare

      - name: Build APK
        env:
          SENTRY_DSN: ""
        run: make android-apk-release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-patched-core
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
