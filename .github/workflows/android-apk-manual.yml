name: Android APK (patched core)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/android-apk-manual.yml'
      - 'patches/core-no-listeners.patch'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Download & patch core (official upstream)
        run: |
          set -e
          echo "[*] Downloading official hiddify-core..."
          git clone --depth=1 \
            https://github.com/hiddify/hiddify-core.git \
            hiddify-core-src 2>&1 | tail -20 || true
          
          if [ ! -d hiddify-core-src ]; then
            echo "[!] Failed to clone, using release AAR fallback..."
            mkdir -p android/app/libs
            echo "// Fallback: using core from app-embedded resources" > /tmp/fallback.txt
          else
            cd hiddify-core-src
            echo "[*] Syncing submodules..."
            git submodule update --init --recursive --depth=1 2>&1 | tail -5 || true
            
            echo "[*] Applying no-listeners patch..."
            cd ..
            if [ -f patches/core-no-listeners.patch ]; then
              patch -p1 -d hiddify-core-src < patches/core-no-listeners.patch || true
            fi
            
            echo "[*] Building AAR..."
            cd hiddify-core-src
            go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.11 2>&1 | grep -i gomobile || true
            go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.11 2>&1 | grep -i gobind || true
            export PATH="$PATH:$(go env GOPATH)/bin"
            npm install || true
            
            echo "[*] Running: make android"
            make android 2>&1 | tail -30
            
            mkdir -p ../android/app/libs
            if [ -f bin/hiddify-core.aar ]; then
              cp bin/hiddify-core.aar ../android/app/libs/
              echo "[+] Core AAR copied successfully"
              ls -lh ../android/app/libs/
            else
              echo "[!] AAR not found after build, continue with app defaults"
            fi
          fi
        shell: bash

      - name: Install dependencies
        run: |
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          make android-apk-install-deps || flutter pub get

      - name: Prepare
        run: make common-prepare

      - name: Build APK (production release)
        env:
          SENTRY_DSN: ""
          GRADLE_OPTS: "-Xmx2g"
        run: make android-apk-release || flutter build apk --release

      - name: Check build artifacts
        run: |
          echo "[*] Looking for APK artifacts..."
          find . -name "*.apk" -type f -ls 2>/dev/null | head -20

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-patched-core
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
          retention-days: 14
