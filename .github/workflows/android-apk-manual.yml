name: Android APK Manual

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'appcast.xml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: |
          make android-apk-install-deps
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare
        run: make android-apk-prepare

      - name: Build APK
        env:
          SENTRY_DSN: ""
        run: make android-apk-release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 7
