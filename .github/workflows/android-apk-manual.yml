name: Android APK (patched core)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'appcast.xml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r27
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Clone hiddify-core (official upstream)
        run: |
          git clone --depth=1 https://github.com/hiddify/hiddify-core.git hiddify-core
          cd hiddify-core
          git submodule update --init --recursive --depth=1
          echo "Core commit: $(git rev-parse HEAD)"

      - name: Apply no-listeners patch
        run: |
          cd hiddify-core
          git apply --ignore-whitespace ../patches/core-no-listeners.patch
          echo "=== Verify patches ==="
          grep "MixedPort:      0," v2/config/hiddify_option.go && echo "OK: MixedPort=0"
          grep "MixedPort > 0" v2/config/builder.go && echo "OK: MixedPort guard"
          grep "ClashApiPort > 0" v2/config/builder.go && echo "OK: ClashApi guard"

      - name: Install sagernet gomobile
        run: |
          go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.11
          go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.11
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Android core from source
        working-directory: hiddify-core
        run: |
          npm install || true
          mkdir -p bin
          TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_clash_api,with_grpc,with_awg,tfogo_checklinkname0,with_naive_outbound,with_conntrack"
          LDFLAGS="-w -s -checklinkname=0 -buildid="
          CGO_LDFLAGS="-O2 -g -s -w -Wl,-z,max-page-size=16384" \
            gomobile bind \
              -v -androidapi=21 \
              -javapkg=com.hiddify.core \
              -libname=hiddify-core \
              -tags="${TAGS}" \
              -trimpath \
              -ldflags="${LDFLAGS}" \
              -target=android \
              -gcflags="all=-N -l" \
              -o bin/hiddify-core.aar \
              github.com/sagernet/sing-box/experimental/libbox ./platform/mobile
          echo "=== Core build output ==="
          ls -lh bin/

      - name: Copy core AAR to Flutter app libs
        run: |
          mkdir -p android/app/libs
          cp hiddify-core/bin/hiddify-core.aar android/app/libs/
          echo "=== android/app/libs ==="
          ls -lh android/app/libs/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install Flutter deps
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare (pub get + gen + translate)
        run: make common-prepare

      - name: Build APK (arm + arm64 + x64)
        env:
          SENTRY_DSN: ""
        run: make android-apk-release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-patched-core
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
